<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walrus & SUI Monitor - GeckoTerminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
        .price-text { color: #58a6ff; }
        .chart-wrapper { position: relative; width: 100%; height: 500px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-7xl mx-auto">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-white">Sui Network Terminal</h1>
                <p class="text-sm text-gray-400">Data Real-time via GeckoTerminal</p>
            </div>
            <div id="clock" class="text-sm font-mono text-gray-500"></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="card">
                <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
                    <div>
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Pair: WAL/SUI</span>
                        <h2 class="text-xl font-bold text-blue-400">WALRUS (WAL)</h2>
                    </div>
                    <div class="text-right">
                        <div id="wal-price-usd" class="text-lg font-bold text-white leading-none">$0.00</div>
                        <div id="wal-price-idr" class="text-xs text-gray-400 mt-1">Rp 0</div>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <iframe 
                        src="https://www.geckoterminal.com/sui-network/pools/0x5734e6284f1b2d35c59367d32c918a09f98482436d655f4625575501865e944a?embed=1&info=0&swaps=1&grayscale=0&light_chart=0" 
                        allow="clipboard-write" allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="card">
                <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
                    <div>
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Pair: SUI/USDC</span>
                        <h2 class="text-xl font-bold text-cyan-400">SUI (SUI)</h2>
                    </div>
                    <div class="text-right">
                        <div id="sui-price-usd" class="text-lg font-bold text-white leading-none">$0.00</div>
                        <div id="sui-price-idr" class="text-xs text-gray-400 mt-1">Rp 0</div>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <iframe 
                        src="https://www.geckoterminal.com/sui-network/pools/0x06029013c4c92472b46761596e2f170f8623631584c31278187cc8042456f91f?embed=1&info=0&swaps=1&grayscale=0&light_chart=0" 
                        allow="clipboard-write" allowfullscreen>
                    </iframe>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Fungsi Update Harga via Coingecko API untuk Header
        async function fetchRealtimePrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=walrus-2,sui&vs_currencies=usd,idr');
                const data = await response.json();
                
                const formatUSD = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 4 }).format(val);
                const formatIDR = (val) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(val);

                if(data['walrus-2']) {
                    document.getElementById('wal-price-usd').innerText = formatUSD(data['walrus-2'].usd);
                    document.getElementById('wal-price-idr').innerText = formatIDR(data['walrus-2'].idr);
                }
                if(data['sui']) {
                    document.getElementById('sui-price-usd').innerText = formatUSD(data['sui'].usd);
                    document.getElementById('sui-price-idr').innerText = formatIDR(data['sui'].idr);
                }
            } catch (err) {
                console.error("Price fetch error");
            }
        }

        // Jam digital sederhana
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleString('id-ID');
        }, 1000);

        // Update harga setiap 20 detik
        fetchRealtimePrices();
        setInterval(fetchRealtimePrices, 20000);
    </script>
</body>
</html>
