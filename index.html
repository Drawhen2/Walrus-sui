<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetus Protocol - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0B0E14; 
            color: #E2E8F0; 
            font-family: 'Inter', sans-serif; 
        }
        .cetus-card { 
            background: #11141D; 
            border-radius: 16px; 
            border: 1px solid #1E2333; 
        }
        .cetus-gradient-text {
            background: linear-gradient(90deg, #00C2FF 0%, #14F195 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .skeleton { 
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; 
            background-color: #1E2333; 
            border-radius: 0.25rem; 
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        /* Scrollbar custom ala Cetus */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0B0E14; }
        ::-webkit-scrollbar-thumb { background: #1E2333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2A3143; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold cetus-gradient-text mb-2">
                    My Asset Portfolio
                </h1>
                <div class="text-sm text-slate-400 flex items-center gap-2 justify-center md:justify-start">
                    <span class="w-2 h-2 rounded-full bg-[#14F195] animate-pulse"></span>
                    <span id="status-text">Sinkronisasi ke jaringan Sui...</span>
                </div>
            </div>
            
            <div class="w-full md:w-auto bg-[#11141D] border border-[#1E2333] rounded-xl p-3 flex items-center gap-3 shadow-lg">
                <div class="w-10 h-10 rounded-full bg-gradient-to-r from-[#00C2FF] to-[#14F195] p-[1px]">
                    <div class="w-full h-full rounded-full bg-[#0B0E14] flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#14F195]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                        </svg>
                    </div>
                </div>
                <div>
                    <p class="text-xs text-slate-500 mb-0.5">Connected Wallet</p>
                    <p class="text-sm font-mono text-slate-300">0xa3be...22f7</p>
                </div>
            </div>
        </header>

        <div class="flex flex-wrap items-center justify-start gap-3 mb-6">
            <button onclick="handleRefresh()" class="flex-1 md:flex-none bg-[#1E2333] hover:bg-[#2A3143] text-white text-sm font-medium px-4 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg border border-[#2A3143]">
                <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Refresh Data
            </button>
            
            <a href="https://app.cetus.zone/swap" target="_blank" class="flex-1 md:flex-none bg-[#00C2FF]/10 hover:bg-[#00C2FF]/20 text-[#00C2FF] border border-[#00C2FF]/30 text-sm font-medium px-4 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:rotate-180 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
                Trade on Cetus
            </a>
        </div>

        <div class="cetus-card mb-8 overflow-hidden relative shadow-2xl">
            <div class="absolute top-0 right-0 w-64 h-64 bg-[#00C2FF] rounded-full mix-blend-screen filter blur-[100px] opacity-10"></div>
            <div class="absolute bottom-0 left-0 w-64 h-64 bg-[#14F195] rounded-full mix-blend-screen filter blur-[100px] opacity-10"></div>
            
            <div class="p-8 relative z-10">
                <p class="text-slate-400 text-sm font-medium mb-2">Total Estimasi Asset</p>
                <h2 class="text-4xl md:text-5xl font-bold text-white tracking-tight" id="total-usd">
                    <div class="skeleton h-12 w-48 mb-2"></div>
                </h2>
                <p class="text-slate-400 text-base mt-2" id="total-idr">
                    <div class="skeleton h-5 w-32"></div>
                </p>
            </div>
        </div>

        <div class="cetus-card overflow-hidden shadow-lg">
            <div class="p-5 border-b border-[#1E2333] bg-[#0B0E14]/30">
                <h3 class="text-lg font-semibold text-white">Daftar Koin / Token</h3>
            </div>
            
            <div class="hidden md:grid grid-cols-4 gap-4 p-4 border-b border-[#1E2333] text-xs font-medium text-slate-500 bg-[#11141D]">
                <div class="col-span-2">Token</div>
                <div class="text-right">Balance</div>
                <div class="text-right">Value</div>
            </div>

            <div id="asset-list" class="max-h-[600px] overflow-y-auto">
                <div class="p-4 border-b border-[#1E2333] flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="skeleton w-10 h-10 rounded-full"></div>
                        <div class="space-y-2">
                            <div class="skeleton w-24 h-4"></div>
                            <div class="skeleton w-16 h-3"></div>
                        </div>
                    </div>
                    <div class="space-y-2 text-right">
                        <div class="skeleton w-20 h-4 ml-auto"></div>
                        <div class="skeleton w-16 h-3 ml-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUI_ADDRESS = "0xa3be17deeecb502096e7e8d107dbef81d96bdcf4fc5eab2aff4489988fde22f7";
        const SUI_RPC_URL = "https://fullnode.mainnet.sui.io:443";
        
        const formatterUSD = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 });
        const formatterIDR = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

        // Fungsi Trigger Refresh Tombol
        async function handleRefresh() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin', 'text-[#00C2FF]'); // Tambah animasi putar & ubah warna
            
            // Set Loading UI Sementara
            document.getElementById('status-text').innerText = "Menyegarkan data...";
            
            // Panggil Fungsi Fetch Utama
            await fetchAssetData();
            
            // Hapus Animasi Putar setelah selesai
            icon.classList.remove('animate-spin', 'text-[#00C2FF]');
        }

        async function fetchAssetData() {
            try {
                // 1. Fetch Semua Saldo Token
                const balResponse = await fetch(SUI_RPC_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: "2.0", id: 1, method: "suix_getAllBalances", params: [SUI_ADDRESS]
                    })
                });
                const balData = await balResponse.json();
                const balances = balData.result;

                if (!balances || balances.length === 0) {
                    document.getElementById('asset-list').innerHTML = '<div class="p-8 text-center text-slate-500">Tidak ada aset ditemukan di dompet ini.</div>';
                    document.getElementById('total-usd').innerText = "$0.00";
                    document.getElementById('total-idr').innerText = "Rp 0";
                    document.getElementById('status-text').innerText = "Terhubung";
                    return;
                }

                // 2. Fetch Metadata Token secara paralel
                const metaPromises = balances.map(b => 
                    fetch(SUI_RPC_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ jsonrpc: "2.0", id: b.coinType, method: "suix_getCoinMetadata", params: [b.coinType] })
                    }).then(res => res.json())
                );
                const metaResults = await Promise.all(metaPromises);

                // 3. Ambil Kurs USD ke IDR dari CoinGecko
                let idrRate = 16000; // Harga default jika API gagal
                try {
                    const cgRate = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=usd-coin&vs_currencies=idr');
                    const cgData = await cgRate.json();
                    if (cgData['usd-coin'] && cgData['usd-coin'].idr) {
                        idrRate = cgData['usd-coin'].idr;
                    }
                } catch (e) {
                    console.warn("Gagal mengambil kurs IDR, menggunakan nilai default.");
                }

                // 4. Fetch Harga Token dari DexScreener
                const priceMap = {};
                const coinTypes = balances.map(b => b.coinType);
                
                const chunkSize = 15;
                for (let i = 0; i < coinTypes.length; i += chunkSize) {
                    const chunk = coinTypes.slice(i, i + chunkSize);
                    try {
                        const dexRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${chunk.join(',')}`);
                        const dexData = await dexRes.json();
                        
                        if (dexData && dexData.pairs) {
                            dexData.pairs.forEach(pair => {
                                const tokenAddr = pair.baseToken.address;
                                const liquidity = parseFloat(pair.liquidity?.usd || 0);
                                
                                if (!priceMap[tokenAddr] || liquidity > priceMap[tokenAddr].liquidity) {
                                    priceMap[tokenAddr] = {
                                        priceUsd: parseFloat(pair.priceUsd || 0),
                                        priceChange24h: parseFloat(pair.priceChange?.h24 || 0),
                                        liquidity: liquidity
                                    };
                                }
                            });
                        }
                    } catch(e) {
                        console.warn('Gagal fetch data dari DexScreener:', e);
                    }
                }

                // Fallback khusus SUI
                if (!priceMap["0x2::sui::SUI"]) {
                    try {
                        const cgSui = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=sui&vs_currencies=usd&include_24hr_change=true');
                        const cgSuiData = await cgSui.json();
                        if(cgSuiData.sui) {
                            priceMap["0x2::sui::SUI"] = {
                                priceUsd: cgSuiData.sui.usd,
                                priceChange24h: cgSuiData.sui.usd_24h_change || 0,
                                liquidity: 999999999
                            };
                        }
                    } catch (e) {}
                }

                let totalUsd = 0;
                let totalIdr = 0;
                let htmlContent = '';

                // 5. Proses dan Render Data
                balances.forEach((b, index) => {
                    const meta = metaResults[index].result || {};
                    
                    const decimals = meta.decimals || 9; // Default SUI
                    const symbol = meta.symbol || b.coinType.split('::').pop();
                    const name = meta.name || symbol;
                    let iconUrl = meta.iconUrl || `https://ui-avatars.com/api/?name=${symbol}&background=11141D&color=14F195`;

                    if (b.coinType === "0x2::sui::SUI") iconUrl = "https://cryptologos.cc/logos/sui-sui-logo.png";
                    if (b.coinType === "0x356a26eb9e012a68958082340d4c4116e7f55615cf27affcff209cf0ae544f59::wal::WAL") iconUrl = "https://assets.coingecko.com/coins/images/39566/standard/walrus.jpg";

                    const rawBalance = parseInt(b.totalBalance);
                    const actualBalance = rawBalance / Math.pow(10, decimals);

                    let coinPrice = 0;
                    let priceChange = 0;
                    let coinUsd = 0;
                    let coinIdr = 0;

                    if (priceMap[b.coinType]) {
                        coinPrice = priceMap[b.coinType].priceUsd;
                        priceChange = priceMap[b.coinType].priceChange24h;
                        coinUsd = actualBalance * coinPrice;
                        coinIdr = coinUsd * idrRate;
                        
                        totalUsd += coinUsd;
                        totalIdr += coinIdr;
                    }

                    if (actualBalance > 0) {
                        const changeColor = priceChange >= 0 ? 'text-[#14F195]' : 'text-red-400';
                        const changeSign = priceChange > 0 ? '+' : '';
                        
                        const detailUrl = `asset.html?type=${encodeURIComponent(b.coinType)}&symbol=${encodeURIComponent(symbol)}&name=${encodeURIComponent(name)}&balance=${actualBalance}`;

                        htmlContent += `
                            <a href="${detailUrl}" class="block border-b border-[#1E2333] hover:bg-[#1A1F2E] transition-all cursor-pointer group">
                                <div class="p-4 md:grid md:grid-cols-4 md:gap-4 flex justify-between items-center">
                                    
                                    <div class="col-span-2 flex items-center gap-4">
                                        <div class="w-10 h-10 rounded-full overflow-hidden bg-[#1E2333] border border-[#2A3143] group-hover:border-[#00C2FF] transition-colors shrink-0">
                                            <img src="${iconUrl}" alt="${symbol}" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=${symbol}&background=11141D&color=14F195'">
                                        </div>
                                        <div>
                                            <h3 class="font-bold text-white text-base flex items-center gap-2">
                                                ${name} 
                                                <span class="text-xs text-[#00C2FF] font-medium bg-[#00C2FF]/10 border border-[#00C2FF]/20 px-1.5 py-0.5 rounded">${symbol}</span>
                                            </h3>
                                            <p class="text-sm text-slate-400 mt-0.5 flex items-center gap-2">
                                                ${coinPrice > 0 ? formatterUSD.format(coinPrice) : 'Harga N/A'}
                                                ${coinPrice > 0 ? `<span class="text-xs font-medium ${changeColor}">${changeSign}${priceChange.toFixed(2)}%</span>` : ''}
                                            </p>
                                        </div>
                                    </div>

                                    <div class="hidden md:flex flex-col justify-center text-right">
                                        <p class="text-white font-medium">${actualBalance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 6 })}</p>
                                        <p class="text-xs text-slate-500 mt-0.5">${symbol}</p>
                                    </div>

                                    <div class="text-right flex flex-col justify-center">
                                        <p class="font-bold text-white">${coinUsd > 0 ? formatterUSD.format(coinUsd) : '$0.00'}</p>
                                        <p class="text-xs text-slate-400 mt-0.5 hidden md:block">${coinIdr > 0 ? formatterIDR.format(coinIdr) : 'Rp 0'}</p>
                                        
                                        <p class="text-xs text-slate-500 mt-1 md:hidden">${actualBalance.toLocaleString('en-US', { maximumFractionDigits: 4 })} ${symbol}</p>
                                    </div>
                                </div>
                            </a>
                        `;
                    }
                });

                // Update UI DOM
                document.getElementById('asset-list').innerHTML = htmlContent || '<div class="p-8 text-center text-slate-500">Tidak ada saldo koin yang tersedia.</div>';
                document.getElementById('total-usd').innerText = formatterUSD.format(totalUsd);
                document.getElementById('total-idr').innerText = formatterIDR.format(totalIdr);
                
                document.getElementById('status-text').innerText = "Terhubung • Diperbarui: " + new Date().toLocaleTimeString('id-ID');

            } catch (error) {
                console.error("Gagal mengambil data:", error);
                document.getElementById('status-text').innerHTML = '<span class="text-red-400">Koneksi RPC Error</span>';
                document.getElementById('asset-list').innerHTML = '<div class="p-8 text-center text-red-400">Terjadi kesalahan saat membaca data dari blockchain Sui.</div>';
            }
        }

        fetchAssetData();
    </script>
</body>
</html>
