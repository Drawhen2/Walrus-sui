<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walrus & SUI Real-time Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .price-up { color: #22c55e; }
        .price-down { color: #ef4444; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-blue-400">Crypto Real-time Monitor</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            
            <div class="card">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Walrus (WAL)</h2>
                    <span id="wal-change" class="text-sm font-bold px-2 py-1 rounded bg-gray-700">--%</span>
                </div>
                <div class="text-4xl font-bold mb-2" id="wal-usd">$0.00</div>
                <div class="text-lg text-gray-400" id="wal-idr">Rp 0</div>
            </div>

            <div class="card">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Sui (SUI)</h2>
                    <span id="sui-change" class="text-sm font-bold px-2 py-1 rounded bg-gray-700">--%</span>
                </div>
                <div class="text-4xl font-bold mb-2" id="sui-usd">$0.00</div>
                <div class="text-lg text-gray-400" id="sui-idr">Rp 0</div>
            </div>
        </div>

        <div class="card h-[500px] mb-8">
            <h2 class="text-xl font-semibold mb-4 text-blue-300">Market Chart (SUI/USDT)</h2>
            <div id="tradingview_widget" class="h-full"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:SUIUSDT",
            "interval": "60",
            "timezone": "Asia/Jakarta",
            "theme": "dark",
            "style": "1",
            "locale": "id",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "save_image": false,
            "container_id": "tradingview_widget"
        });
    </script>

    <script>
        const formatterUSD = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
        const formatterIDR = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

        async function fetchPrices() {
            try {
                // Walrus (WAL) seringkali terdaftar sebagai 'walrus' di Coingecko
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=walrus-2,sui&vs_currencies=usd,idr&include_24hr_change=true');
                const data = await response.json();

                updateUI('wal', data['walrus-2']);
                updateUI('sui', data['sui']);
            } catch (error) {
                console.error("Gagal mengambil data harga:", error);
            }
        }

        function updateUI(coin, data) {
            const usdElem = document.getElementById(`${coin}-usd`);
            const idrElem = document.getElementById(`${coin}-idr`);
            const changeElem = document.getElementById(`${coin}-change`);

            if (data) {
                usdElem.innerText = formatterUSD.format(data.usd);
                idrElem.innerText = formatterIDR.format(data.idr);
                
                const change = data.usd_24h_change.toFixed(2);
                changeElem.innerText = (change > 0 ? '+' : '') + change + '%';
                changeElem.className = `text-sm font-bold px-2 py-1 rounded ${change >= 0 ? 'bg-green-900 text-green-400' : 'bg-red-900 text-red-400'}`;
            }
        }

        // Update harga setiap 30 detik
        fetchPrices();
        setInterval(fetchPrices, 30000);
    </script>
</body>
</html>
