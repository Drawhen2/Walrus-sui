<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetus Protocol - Asset Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { 
            background-color: #0B0E14; 
            color: #E2E8F0; 
            font-family: 'Inter', sans-serif; 
        }
        .cetus-card { 
            background: #11141D; 
            border-radius: 16px; 
            border: 1px solid #1E2333; 
        }
        .cetus-gradient-text {
            background: linear-gradient(90deg, #00C2FF 0%, #14F195 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chart-container { 
            height: 500px; 
            width: 100%; 
        }
        @media (max-width: 768px) {
            .chart-container { height: 400px; }
        }
        
        .skeleton { 
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; 
            background-color: #1E2333; 
            border-radius: 0.25rem; 
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0B0E14; }
        ::-webkit-scrollbar-thumb { background: #1E2333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2A3143; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <a href="index.html" class="flex-shrink-0 bg-[#11141D] hover:bg-[#1A1F2E] border border-[#1E2333] text-white p-2.5 rounded-xl transition-all flex justify-center items-center group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </a>
                <div>
                    <h1 class="text-2xl font-bold flex items-center gap-3">
                        <img id="coin-icon" src="https://ui-avatars.com/api/?name=C&background=11141D&color=14F195" alt="Icon" class="w-8 h-8 rounded-full bg-[#1E2333]">
                        <span id="coin-name">Loading...</span>
                        <span id="coin-symbol" class="text-sm text-[#00C2FF] bg-[#00C2FF]/10 border border-[#00C2FF]/20 px-2 py-1 rounded-md">--</span>
                    </h1>
                </div>
            </div>
            
            <div class="w-full md:w-auto text-sm font-mono text-slate-400 bg-[#11141D] border border-[#1E2333] px-4 py-2 rounded-xl flex items-center justify-center md:justify-start gap-2">
                <div class="w-2 h-2 rounded-full bg-[#14F195]"></div>
                0xa3be...22f7
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="cetus-card p-6 shadow-lg">
                <p class="text-slate-400 text-sm font-medium mb-1">Jumlah Koin Dimiliki</p>
                <h2 class="text-3xl font-bold text-white mt-1" id="owned-balance">
                    <div class="skeleton h-8 w-32"></div>
                </h2>
                <p class="text-sm text-slate-500 mt-1 flex items-center gap-1">
                    Di dompet saat ini
                </p>
            </div>

            <div class="cetus-card p-6 shadow-lg">
                <p class="text-slate-400 text-sm font-medium mb-1">Harga Saat Ini</p>
                <div class="flex items-end gap-3">
                    <h2 class="text-3xl font-bold text-white mt-1" id="current-price">
                        <div class="skeleton h-8 w-24"></div>
                    </h2>
                    <span id="price-change" class="text-sm font-medium mb-1"></span>
                </div>
                <p class="text-sm text-slate-500 mt-1" id="current-price-idr">
                    <div class="skeleton h-4 w-20"></div>
                </p>
            </div>

            <div class="cetus-card p-6 shadow-lg relative overflow-hidden border-[#00C2FF]/30">
                <div class="absolute -right-10 -top-10 w-32 h-32 bg-[#00C2FF] rounded-full mix-blend-screen filter blur-[50px] opacity-20"></div>
                <p class="text-slate-400 text-sm font-medium mb-1 relative z-10">Total Nilai Aset</p>
                <h2 class="text-3xl font-bold cetus-gradient-text mt-1 relative z-10" id="total-value-usd">
                    <div class="skeleton h-8 w-32"></div>
                </h2>
                <p class="text-sm text-[#14F195] mt-1 relative z-10 font-medium" id="total-value-idr">
                    <div class="skeleton h-4 w-24"></div>
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="cetus-card lg:col-span-2 overflow-hidden shadow-lg p-1">
                <div class="px-5 py-4 border-b border-[#1E2333] flex justify-between items-center bg-[#0B0E14]/50 rounded-t-[15px]">
                    <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#00C2FF]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
                        </svg>
                        Analisis Harga <span id="chart-title"></span>
                    </h3>
                </div>
                <div id="tv_chart_container" class="chart-container"></div>
            </div>

            <div class="cetus-card shadow-lg flex flex-col h-full">
                <div class="p-5 border-b border-[#1E2333] bg-[#0B0E14]/50">
                    <h3 class="text-lg font-semibold text-white">Riwayat Transaksi</h3>
                </div>
                
                <div class="flex-1 p-4 overflow-y-auto max-h-[450px] space-y-3">
                    
                    <div class="p-3 rounded-lg bg-[#0B0E14] border border-[#1E2333] flex justify-between items-center hover:border-[#2A3143] transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-green-500/10 flex items-center justify-center text-green-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12" /></svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-white">Receive</p>
                                <p class="text-xs text-slate-500">Hari ini, 14:30</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold text-[#14F195]">+ <span class="history-amount">--</span></p>
                            <p class="text-xs text-slate-500 font-mono">Success</p>
                        </div>
                    </div>

                    <div class="p-3 rounded-lg bg-[#0B0E14] border border-[#1E2333] flex justify-between items-center hover:border-[#2A3143] transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-red-500/10 flex items-center justify-center text-red-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h9m5-4v12m0 0l-4-4m4 4l4-4" /></svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-white">Send</p>
                                <p class="text-xs text-slate-500">Kemarin, 09:15</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold text-red-400">- 5.00</p>
                            <p class="text-xs text-slate-500 font-mono">Success</p>
                        </div>
                    </div>

                    <div class="p-3 rounded-lg bg-[#0B0E14] border border-[#1E2333] flex justify-between items-center hover:border-[#2A3143] transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-white">Swap</p>
                                <p class="text-xs text-slate-500">12 Apr 2026</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold text-white">Executed</p>
                            <p class="text-xs text-[#00C2FF] font-mono hover:underline cursor-pointer">View Tx</p>
                        </div>
                    </div>
                </div>
                
                <div class="p-4 border-t border-[#1E2333]">
                    <button class="w-full py-2 rounded-lg bg-[#1E2333] hover:bg-[#2A3143] text-sm font-medium text-white transition-colors">
                        Lihat Semua Transaksi di Explorer
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Formatters
        const formatterUSD = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 6 });
        const formatterIDR = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

        // Parsing Parameter URL (Dikirim dari index.html)
        const urlParams = new URLSearchParams(window.location.search);
        const coinType = urlParams.get('type');
        const symbol = urlParams.get('symbol') || 'SUI';
        const name = urlParams.get('name') || 'Sui';
        const balance = parseFloat(urlParams.get('balance')) || 0;

        // Menentukan Ikon
        let iconUrl = `https://ui-avatars.com/api/?name=${symbol}&background=11141D&color=14F195`;
        if (symbol.toUpperCase() === "SUI") iconUrl = "https://cryptologos.cc/logos/sui-sui-logo.png";
        if (symbol.toUpperCase() === "WAL") iconUrl = "https://assets.coingecko.com/coins/images/39566/standard/walrus.jpg";

        // Update UI Dasar
        document.getElementById('coin-name').innerText = name;
        document.getElementById('coin-symbol').innerText = symbol.toUpperCase();
        document.getElementById('coin-icon').src = iconUrl;
        document.getElementById('chart-title').innerText = `${symbol.toUpperCase()}/USDT`;
        
        // Update Saldo (Koin yang dimiliki)
        document.getElementById('owned-balance').innerText = balance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 6 }) + ' ' + symbol.toUpperCase();
        document.querySelector('.history-amount').innerText = (balance > 10 ? (balance / 2).toFixed(2) : balance.toFixed(2)) + ' ' + symbol.toUpperCase(); // Mock data riwayat

        // Fetch Harga (Menggunakan DexScreener sesuai dengan Index.html)
        async function fetchPrice() {
            if (!coinType) {
                renderEmptyPrice();
                return;
            }

            let priceUsd = 0;
            let priceChange24h = 0;
            let idrRate = 16000; // Harga default IDR

            try {
                // 1. Ambil Kurs USD ke IDR dari CoinGecko
                const cgRate = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=usd-coin&vs_currencies=idr');
                const cgData = await cgRate.json();
                if (cgData['usd-coin'] && cgData['usd-coin'].idr) {
                    idrRate = cgData['usd-coin'].idr;
                }
            } catch (e) {
                console.warn("Gagal mengambil kurs IDR, menggunakan nilai default.");
            }

            try {
                // 2. Fetch Harga dari DexScreener menggunakan Token Address (Sangat akurat untuk jaringan Sui)
                const dexRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${coinType}`);
                const dexData = await dexRes.json();
                
                if (dexData && dexData.pairs && dexData.pairs.length > 0) {
                    // Cari pool dengan liquiditas paling tinggi
                    let bestPair = dexData.pairs[0];
                    dexData.pairs.forEach(pair => {
                        if (parseFloat(pair.liquidity?.usd || 0) > parseFloat(bestPair.liquidity?.usd || 0)) {
                            bestPair = pair;
                        }
                    });
                    
                    priceUsd = parseFloat(bestPair.priceUsd || 0);
                    priceChange24h = parseFloat(bestPair.priceChange?.h24 || 0);
                } 
                // Fallback khusus SUI (Karena SUI koin native, DexScreener kadang butuh waktu/ID pool spesifik)
                else if (coinType === "0x2::sui::SUI") {
                    const cgSui = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=sui&vs_currencies=usd&include_24hr_change=true');
                    const cgSuiData = await cgSui.json();
                    if(cgSuiData.sui) {
                        priceUsd = cgSuiData.sui.usd;
                        priceChange24h = cgSuiData.sui.usd_24h_change || 0;
                    }
                }

                // Jika harga ditemukan, proses render ke layar
                if (priceUsd > 0) {
                    const priceIdr = priceUsd * idrRate;
                    const totalUsd = balance * priceUsd;
                    const totalIdr = totalUsd * idrRate;

                    // Render Harga Koin Saat Ini
                    document.getElementById('current-price').innerText = formatterUSD.format(priceUsd);
                    document.getElementById('current-price-idr').innerText = formatterIDR.format(priceIdr);
                    
                    // Render Persentase Perubahan
                    const changeEl = document.getElementById('price-change');
                    changeEl.innerText = (priceChange24h > 0 ? '+' : '') + priceChange24h.toFixed(2) + '%';
                    changeEl.className = `text-sm font-medium px-2 py-1 rounded ${priceChange24h >= 0 ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`;

                    // Render Total Nilai Aset Berdasarkan Saldo
                    document.getElementById('total-value-usd').innerText = formatterUSD.format(totalUsd);
                    document.getElementById('total-value-idr').innerText = formatterIDR.format(totalIdr);
                } else {
                    renderEmptyPrice();
                }

            } catch (error) {
                console.error("Gagal mengambil harga:", error);
                renderEmptyPrice();
            }
        }

        // Fungsi fallback jika harga tidak ditemukan
        function renderEmptyPrice() {
            document.getElementById('current-price').innerText = "Harga N/A";
            document.getElementById('current-price-idr').innerText = "-";
            document.getElementById('total-value-usd').innerText = "$0.00";
            document.getElementById('total-value-idr').innerText = "Rp 0";
        }

        // Setup Chart (TradingView untuk Koin Mayor, DexScreener Embed untuk Token DEX)
        function initChart() {
            const chartContainer = document.getElementById('tv_chart_container');
            const symUp = symbol.toUpperCase();

            // Daftar koin major yang di-support penuh oleh TradingView
            const majorCoins = ['SUI', 'USDC', 'USDT', 'BTC', 'ETH'];

            if (majorCoins.includes(symUp)) {
                // Gunakan TradingView Widget
                let tvSymbol = `BINANCE:${symUp}USDT`;
                
                new TradingView.widget({
                    "autosize": true,
                    "symbol": tvSymbol,
                    "interval": "60",
                    "timezone": "Asia/Jakarta",
                    "theme": "dark",
                    "style": "1",
                    "locale": "id",
                    "enable_publishing": false,
                    "backgroundColor": "#11141D",
                    "gridColor": "#1E2333",
                    "hide_top_toolbar": false,
                    "save_image": false,
                    "container_id": "tv_chart_container"
                });
            } else {
                // Gunakan DexScreener Embed untuk token DEX (seperti XMN, WAL, dll)
                if (coinType) {
                    chartContainer.innerHTML = `
                        <iframe 
                            width="100%" 
                            height="100%" 
                            src="https://dexscreener.com/sui/${coinType}?embed=1&theme=dark&info=0" 
                            frameborder="0"
                            style="border-radius: 0 0 15px 15px;">
                        </iframe>
                    `;
                } else {
                    chartContainer.innerHTML = '<div class="flex items-center justify-center h-full text-slate-500">Data grafik tidak tersedia</div>';
                }
            }
        }

        // Eksekusi fungsi saat page diload
        fetchPrice();
        initChart();
    </script>
</body>
</html>
